<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNREAL 007 CASE</title>
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: 'League Spartan', sans-serif;
      overflow-x: hidden;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: #000;
    }

    .hero h1 {
      font-size: clamp(2.5rem, 8vw, 7rem);
      font-weight: 900;
      letter-spacing: 0.05em;
      line-height: 1;
    }

    .spacer {
      height: 5vh;
      background: #000;
    }

    @media (min-width: 768px) {
      .spacer {
        height: 60vh;
      }
    }

    .scroll-hint {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      animation: fadeInOut 2.5s infinite;
    }

    .scroll-hint span {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
    }

    .scroll-hint .arrow {
      width: 20px;
      height: 20px;
      border-right: 2px solid rgba(255,255,255,0.3);
      border-bottom: 2px solid rgba(255,255,255,0.3);
      transform: rotate(45deg);
      animation: scrollArrow 2s infinite;
    }

    @keyframes scrollArrow {
      0% { transform: rotate(45deg) translateY(0); opacity: 1; }
      100% { transform: rotate(45deg) translateY(10px); opacity: 0; }
    }

    @keyframes fadeInOut {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .scroll-container {
      height: 800vh;
      position: relative;
    }

    .sticky-frame {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .frame-canvas {
      width: 100vw;
      height: 100vh;
    }

    .loading {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s;
    }

    .loading.done {
      opacity: 0;
      pointer-events: none;
    }

    .loading-bar {
      width: 200px;
      height: 2px;
      background: rgba(255,255,255,0.1);
      border-radius: 1px;
      overflow: hidden;
      margin-top: 1rem;
    }

    .loading-bar-fill {
      height: 100%;
      background: #fff;
      width: 0%;
      transition: width 0.1s;
    }

    .loading p {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.4);
      font-family: 'League Spartan', sans-serif;
    }
  </style>
</head>
<body>

  <div class="loading" id="loading">
    <p>Loading...</p>
    <div class="loading-bar">
      <div class="loading-bar-fill" id="loadingFill"></div>
    </div>
  </div>

  <section class="hero">
    <h1>UNREAL 007 CASE</h1>
    <div class="scroll-hint">
      <span>Scroll</span>
      <div class="arrow"></div>
    </div>
  </section>

  <div class="spacer"></div>

  <section class="scroll-container" id="scrollSection">
    <div class="sticky-frame">
      <canvas class="frame-canvas" id="frameCanvas"></canvas>
    </div>
  </section>

  <script>
    const TOTAL_FRAMES = 240;
    const canvas = document.getElementById('frameCanvas');
    const ctx = canvas.getContext('2d');
    const scrollSection = document.getElementById('scrollSection');
    const loading = document.getElementById('loading');
    const loadingFill = document.getElementById('loadingFill');

    const frames = [];
    let loadedCount = 0;

    let videoBgColor = [0, 0, 0];

    function preloadFrames() {
      for (let i = 1; i <= TOTAL_FRAMES; i++) {
        const img = new Image();
        const num = String(i).padStart(4, '0');
        img.src = 'frames/frame_' + num + '.jpg';
        img.onload = () => {
          loadedCount++;
          loadingFill.style.width = (loadedCount / TOTAL_FRAMES * 100) + '%';
          if (loadedCount === TOTAL_FRAMES) {
            // Sample background color from bottom-center of first frame (assembled suitcase)
            const tmpCanvas = document.createElement('canvas');
            const tmpCtx = tmpCanvas.getContext('2d');
            tmpCanvas.width = frames[0].width;
            tmpCanvas.height = frames[0].height;
            tmpCtx.drawImage(frames[0], 0, 0);
            const pixel = tmpCtx.getImageData(tmpCanvas.width / 2, tmpCanvas.height - 5, 1, 1).data;
            videoBgColor = [pixel[0], pixel[1], pixel[2]];

            loading.classList.add('done');
            resizeCanvas();
            renderFrame(TOTAL_FRAMES - 1, 0);
          }
        };
        frames.push(img);
      }
    }

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.scale(dpr, dpr);
    }

    function renderFrame(index, progress) {
      const img = frames[Math.max(0, Math.min(index, TOTAL_FRAMES - 1))];
      if (!img || !img.complete) return;

      // Blend background: black at start (progress=0), video color when suitcase visible
      const t = Math.max(0, Math.min(1, (progress || 0) * 3)); // transition in first 33%
      const r = Math.round(videoBgColor[0] * t);
      const g = Math.round(videoBgColor[1] * t);
      const b = Math.round(videoBgColor[2] * t);
      const currentBg = 'rgb(' + r + ',' + g + ',' + b + ')';

      const vw = window.innerWidth;
      const vh = window.innerHeight;

      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, vw, vh);

      // Mobile: much bigger, Desktop: contain
      const isMobile = vw < 768;
      const scale = isMobile
        ? (vw / img.width) * 1.8
        : Math.min(vw / img.width, vh / img.height);
      const w = img.width * scale;
      const h = img.height * scale;
      const x = (vw - w) / 2;
      const y = (vh - h) / 2;

      ctx.drawImage(img, x, y, w, h);

      // Fade edges to black so no border is visible
      const edgeSize = 40;
      // Top
      const gradTop = ctx.createLinearGradient(0, y, 0, y + edgeSize);
      gradTop.addColorStop(0, '#000');
      gradTop.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = gradTop;
      ctx.fillRect(x, y, w, edgeSize);
      // Bottom
      const gradBot = ctx.createLinearGradient(0, y + h - edgeSize, 0, y + h);
      gradBot.addColorStop(0, 'rgba(0,0,0,0)');
      gradBot.addColorStop(1, '#000');
      ctx.fillStyle = gradBot;
      ctx.fillRect(x, y + h - edgeSize, w, edgeSize);
      // Left
      const gradLeft = ctx.createLinearGradient(x, 0, x + edgeSize, 0);
      gradLeft.addColorStop(0, '#000');
      gradLeft.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = gradLeft;
      ctx.fillRect(x, y, edgeSize, h);
      // Right
      const gradRight = ctx.createLinearGradient(x + w - edgeSize, 0, x + w, 0);
      gradRight.addColorStop(0, 'rgba(0,0,0,0)');
      gradRight.addColorStop(1, '#000');
      ctx.fillStyle = gradRight;
      ctx.fillRect(x + w - edgeSize, y, edgeSize, h);

      // Cover Veo watermark (bottom-right corner) - responsive size
      ctx.fillStyle = '#000';
      const coverW = Math.min(160, w * 0.12);
      const coverH = Math.min(90, h * 0.12);
      ctx.fillRect(x + w - coverW, y + h - coverH, coverW, coverH);
    }

    window.addEventListener('scroll', () => {
      const rect = scrollSection.getBoundingClientRect();
      const sectionHeight = scrollSection.offsetHeight - window.innerHeight;
      const scrolled = -rect.top;
      const progress = Math.max(0, Math.min(1, scrolled / sectionHeight));

      // Reverse: start from last frame (exploded/dark), scroll to first frame (assembled)
      const frameIndex = TOTAL_FRAMES - 1 - Math.floor(progress * (TOTAL_FRAMES - 1));
      renderFrame(frameIndex, 1 - progress);
    });

    window.addEventListener('resize', () => {
      resizeCanvas();
      const rect = scrollSection.getBoundingClientRect();
      const sectionHeight = scrollSection.offsetHeight - window.innerHeight;
      const scrolled = -rect.top;
      const progress = Math.max(0, Math.min(1, scrolled / sectionHeight));
      const frameIndex = TOTAL_FRAMES - 1 - Math.floor(progress * (TOTAL_FRAMES - 1));
      renderFrame(frameIndex, 1 - progress);
    });

    preloadFrames();
  </script>

</body>
</html>
