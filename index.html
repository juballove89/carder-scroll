<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNREAL 007 CASE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      overflow-x: hidden;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .hero h1 {
      font-size: clamp(2.5rem, 8vw, 7rem);
      font-weight: 900;
      letter-spacing: 0.05em;
      line-height: 1;
    }

    .scroll-container {
      height: 500vh;
      position: relative;
    }

    .sticky-frame {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .frame-canvas {
      width: 100vw;
      height: 100vh;
    }

    .loading {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s;
    }

    .loading.done {
      opacity: 0;
      pointer-events: none;
    }

    .loading-bar {
      width: 200px;
      height: 2px;
      background: rgba(255,255,255,0.1);
      border-radius: 1px;
      overflow: hidden;
      margin-top: 1rem;
    }

    .loading-bar-fill {
      height: 100%;
      background: #fff;
      width: 0%;
      transition: width 0.1s;
    }

    .loading p {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>

  <div class="loading" id="loading">
    <p>Loading...</p>
    <div class="loading-bar">
      <div class="loading-bar-fill" id="loadingFill"></div>
    </div>
  </div>

  <section class="hero">
    <h1>UNREAL 007 CASE</h1>
  </section>

  <section class="scroll-container" id="scrollSection">
    <div class="sticky-frame">
      <canvas class="frame-canvas" id="frameCanvas"></canvas>
    </div>
  </section>

  <script>
    const TOTAL_FRAMES = 240;
    const canvas = document.getElementById('frameCanvas');
    const ctx = canvas.getContext('2d');
    const scrollSection = document.getElementById('scrollSection');
    const loading = document.getElementById('loading');
    const loadingFill = document.getElementById('loadingFill');

    const frames = [];
    let loadedCount = 0;

    function preloadFrames() {
      for (let i = 1; i <= TOTAL_FRAMES; i++) {
        const img = new Image();
        const num = String(i).padStart(4, '0');
        img.src = 'frames/frame_' + num + '.jpg';
        img.onload = () => {
          loadedCount++;
          loadingFill.style.width = (loadedCount / TOTAL_FRAMES * 100) + '%';
          if (loadedCount === TOTAL_FRAMES) {
            loading.classList.add('done');
            resizeCanvas();
            renderFrame(0);
          }
        };
        frames.push(img);
      }
    }

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function renderFrame(index) {
      const img = frames[Math.max(0, Math.min(index, TOTAL_FRAMES - 1))];
      if (!img || !img.complete) return;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const scale = Math.min(canvas.width / img.width, canvas.height / img.height);
      const w = img.width * scale;
      const h = img.height * scale;
      const x = (canvas.width - w) / 2;
      const y = (canvas.height - h) / 2;

      ctx.drawImage(img, x, y, w, h);

      // Cover Veo watermark (bottom-right)
      ctx.fillStyle = '#000';
      ctx.fillRect(x + w - 100, y + h - 40, 100, 40);
    }

    window.addEventListener('scroll', () => {
      const rect = scrollSection.getBoundingClientRect();
      const sectionHeight = scrollSection.offsetHeight - window.innerHeight;
      const scrolled = -rect.top;
      const progress = Math.max(0, Math.min(1, scrolled / sectionHeight));

      const frameIndex = Math.floor(progress * (TOTAL_FRAMES - 1));
      renderFrame(frameIndex);
    });

    window.addEventListener('resize', () => {
      resizeCanvas();
      const rect = scrollSection.getBoundingClientRect();
      const sectionHeight = scrollSection.offsetHeight - window.innerHeight;
      const scrolled = -rect.top;
      const progress = Math.max(0, Math.min(1, scrolled / sectionHeight));
      const frameIndex = Math.floor(progress * (TOTAL_FRAMES - 1));
      renderFrame(frameIndex);
    });

    preloadFrames();
  </script>

</body>
</html>
